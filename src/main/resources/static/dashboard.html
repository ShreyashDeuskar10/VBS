<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Virtual Banking System - Dashboard</title>
  <!-- Import Modern Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
        --primary-gradient: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
        --dark-bg: #0f172a;
        --card-bg: rgba(30, 41, 59, 0.7);
        --text-main: #f8fafc;
        --text-muted: #94a3b8;
        --border-color: rgba(255, 255, 255, 0.1);
        --input-bg: rgba(15, 23, 42, 0.6);
        --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        
        --withdraw-gradient: linear-gradient(135deg, #f43f5e 0%, #be123c 100%);
        --deposit-gradient: linear-gradient(135deg, #10b981 0%, #047857 100%);
        --transfer-gradient: linear-gradient(135deg, #0ea5e9 0%, #0369a1 100%);
        --nav-gradient: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
    }

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: 'Outfit', sans-serif;
        background: radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.1) 0%, transparent 40%),
                    radial-gradient(circle at 90% 80%, rgba(124, 58, 237, 0.1) 0%, transparent 40%),
                    var(--dark-bg);
        min-height: 100vh;
        color: var(--text-main);
        padding: 30px 20px;
    }

    .container {
        width: 100%;
        max-width: 1000px;
        margin: 0 auto;
        background: var(--card-bg);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid var(--border-color);
        border-radius: 24px;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        overflow: hidden;
    }

    .header {
        background: rgba(15, 23, 42, 0.4);
        padding: 25px 40px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid var(--border-color);
    }

    .header-left h1 {
        font-size: 28px;
        font-weight: 800;
        letter-spacing: -1px;
        color: #ffffff;
    }

    .header-left p {
        font-size: 13px;
        color: var(--text-muted);
        letter-spacing: 0.5px;
        margin-top: 2px;
    }

    .logout-btn {
        padding: 10px 20px;
        background: rgba(255, 255, 255, 0.05);
        color: white;
        border: 1px solid var(--border-color);
        border-radius: 12px;
        cursor: pointer;
        font-weight: 600;
        font-family: inherit;
        transition: var(--transition);
    }

    .logout-btn:hover {
        background: rgba(239, 68, 68, 0.2);
        border-color: rgba(239, 68, 68, 0.4);
        color: #f87171;
    }

    .content {
        padding: 40px;
    }

    .dashboard-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 35px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        padding-bottom: 20px;
    }

    .dashboard-header h2 {
        color: white;
        font-size: 28px;
        font-weight: 700;
        letter-spacing: -0.5px;
    }

    .dashboard-header p {
        color: var(--text-muted);
        font-size: 14px;
    }

    .dashboard-grid {
        display: grid;
        grid-template-columns: 1.2fr 1fr;
        gap: 30px;
        margin-bottom: 35px;
    }

    /* Virtual Credit Card View */
    .card-balance {
        background: var(--primary-gradient);
        color: white;
        padding: 35px;
        border-radius: 20px;
        position: relative;
        overflow: hidden;
        box-shadow: 0 15px 35px rgba(99, 102, 241, 0.3);
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        min-height: 220px;
    }

    .card-balance::after {
        content: '';
        position: absolute;
        top: -20%;
        right: -10%;
        width: 250px;
        height: 250px;
        background: radial-gradient(circle, rgba(255,255,255,0.12) 0%, transparent 70%);
        pointer-events: none;
    }

    .card-balance .card-logo {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 18px;
        font-weight: 800;
        letter-spacing: 1px;
    }

    .card-balance .card-chip {
        width: 45px;
        height: 35px;
        background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
        border-radius: 8px;
        margin-top: 15px;
        position: relative;
    }

    .card-balance .balance-label {
        font-size: 13px;
        opacity: 0.8;
        letter-spacing: 1px;
        text-transform: uppercase;
        margin-top: 25px;
    }

    .balance-amount {
        font-size: 38px;
        font-weight: 800;
        letter-spacing: -1px;
        margin-top: 5px;
    }

    /* Bank Details Card */
    .card-bank-details {
        background: rgba(15, 23, 42, 0.4);
        border: 1px solid var(--border-color);
        padding: 30px;
        border-radius: 20px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
    }

    .card-bank-details h3 {
        font-size: 18px;
        color: white;
        margin-bottom: 20px;
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .bank-details-grid {
        display: grid;
        grid-template-columns: 1fr 1.2fr;
        gap: 12px;
        font-size: 14px;
        margin-bottom: 20px;
    }

    .bank-detail-item {
        display: flex;
        flex-direction: column;
    }

    .bank-detail-item .label {
        color: var(--text-muted);
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 3px;
    }

    .bank-detail-item .value {
        color: #ffffff;
        font-weight: 600;
    }

    .bank-detail-item .value.empty {
        color: #f87171;
        font-style: italic;
        font-weight: 400;
    }

    /* Action Buttons Grid */
    .transaction-buttons {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 15px;
        margin-bottom: 10px;
    }

    .btn {
        padding: 16px 12px;
        border: none;
        border-radius: 16px;
        font-size: 14px;
        cursor: pointer;
        transition: var(--transition);
        font-weight: 600;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        font-family: inherit;
        color: white;
        text-shadow: 0 1px 2px rgba(0,0,0,0.2);
    }

    .btn-withdraw {
        background: var(--withdraw-gradient);
        box-shadow: 0 4px 15px rgba(244, 63, 94, 0.2);
    }

    .btn-withdraw:hover {
        transform: translateY(-3px);
        box-shadow: 0 8px 25px rgba(244, 63, 94, 0.4);
    }

    .btn-deposit {
        background: var(--deposit-gradient);
        box-shadow: 0 4px 15px rgba(16, 185, 129, 0.2);
    }

    .btn-deposit:hover {
        transform: translateY(-3px);
        box-shadow: 0 8px 25px rgba(16, 185, 129, 0.4);
    }

    .btn-transfer {
        background: var(--transfer-gradient);
        box-shadow: 0 4px 15px rgba(14, 165, 233, 0.2);
    }

    .btn-transfer:hover {
        transform: translateY(-3px);
        box-shadow: 0 8px 25px rgba(14, 165, 233, 0.4);
    }

    .btn-nav {
        background: var(--nav-gradient);
        box-shadow: 0 4px 15px rgba(99, 102, 241, 0.2);
    }

    .btn-nav:hover {
        transform: translateY(-3px);
        box-shadow: 0 8px 25px rgba(99, 102, 241, 0.4);
    }

    .btn-icon {
        font-size: 22px;
    }

    /* Modal Layout */
    .modal {
        display: none;
        position: fixed;
        z-index: 1000;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(15, 23, 42, 0.8);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        align-items: center;
        justify-content: center;
    }

    .modal.show {
        display: flex;
    }

    .modal-content {
        background: #1e293b;
        border: 1px solid var(--border-color);
        padding: 35px;
        border-radius: 24px;
        max-width: 440px;
        width: 90%;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    .modal-header {
        font-size: 22px;
        font-weight: 700;
        color: white;
        margin-bottom: 20px;
        letter-spacing: -0.5px;
    }

    .form-group {
        margin-bottom: 20px;
    }

    .form-group label {
        display: block;
        margin-bottom: 8px;
        color: var(--text-muted);
        font-weight: 500;
        font-size: 13px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }

    .form-group input,
    .form-group select {
        width: 100%;
        padding: 12px 15px;
        border: 1px solid var(--border-color);
        background: var(--input-bg);
        border-radius: 12px;
        font-size: 14px;
        color: white;
        transition: var(--transition);
        font-family: inherit;
    }

    .form-group input:focus,
    .form-group select:focus {
        outline: none;
        border-color: #6366f1;
        box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
    }

    .modal-buttons {
        display: flex;
        gap: 12px;
        justify-content: flex-end;
        margin-top: 25px;
    }

    .btn-modal {
        padding: 12px 24px;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        font-weight: 600;
        font-family: inherit;
        transition: var(--transition);
    }

    .btn-submit {
        background: var(--primary-gradient);
        color: white;
        box-shadow: 0 4px 15px rgba(99, 102, 241, 0.35);
    }

    .btn-submit:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 25px rgba(99, 102, 241, 0.5);
    }

    .btn-cancel {
        background: rgba(255, 255, 255, 0.05);
        color: var(--text-muted);
        border: 1px solid var(--border-color);
    }

    .btn-cancel:hover {
        background: rgba(255, 255, 255, 0.1);
        color: white;
    }

    .message {
        padding: 14px;
        border-radius: 12px;
        margin-bottom: 25px;
        font-size: 14px;
        display: none;
    }

    .message.success {
        background: rgba(16, 185, 129, 0.15);
        color: #34d399;
        border: 1px solid rgba(16, 185, 129, 0.25);
    }

    .message.error {
        background: rgba(239, 68, 68, 0.15);
        color: #f87171;
        border: 1px solid rgba(239, 68, 68, 0.25);
    }

    .message.show {
        display: block;
    }

    @media (max-width: 800px) {
        .dashboard-grid {
            grid-template-columns: 1fr;
        }

        .transaction-buttons {
            grid-template-columns: repeat(2, 1fr);
        }
        
        .transaction-buttons button:last-child {
            grid-column: span 2;
        }
    }

    @media (max-width: 600px) {
        .header {
            flex-direction: column;
            gap: 15px;
            text-align: center;
        }

        .dashboard-header {
            flex-direction: column;
            gap: 10px;
            align-items: flex-start;
        }

        .transaction-buttons {
            grid-template-columns: 1fr;
        }
        
        .transaction-buttons button:last-child {
            grid-column: span 1;
        }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="header-left">
      <h1>VBS</h1>
      <p>Virtual Banking System</p>
    </div>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>

  <div class="content">
    <div class="dashboard-header">
      <h2 id="welcomeText">Welcome</h2>
      <p>ID: <strong><span id="userId">-</span></strong></p>
    </div>

    <div id="dashMessage" class="message"></div>

    <div class="dashboard-grid">
      <!-- Virtual Card for Balance -->
      <div class="card-balance">
        <div class="card-logo">
          <span>VBS PREMIER</span>
          <span>💳</span>
        </div>
        <div class="card-chip"></div>
        <div>
          <p class="balance-label">Available Balance</p>
          <div class="balance-amount">₹ <span id="balance">0.00</span></div>
        </div>
      </div>

      <!-- Linked Bank Details -->
      <div class="card-bank-details">
        <div>
          <h3>🏛️ Linked Bank Details</h3>
          <div class="bank-details-grid">
            <div class="bank-detail-item">
              <span class="label">Bank Name</span>
              <span class="value" id="bankNameText">Not Linked</span>
            </div>
            <div class="bank-detail-item">
              <span class="label">Branch</span>
              <span class="value" id="branchText">Not Linked</span>
            </div>
            <div class="bank-detail-item">
              <span class="label">Account Number</span>
              <span class="value" id="accountNumberText">Not Linked</span>
            </div>
            <div class="bank-detail-item">
              <span class="label">IFSC Code</span>
              <span class="value" id="ifscCodeText">Not Linked</span>
            </div>
          </div>
        </div>
        
        <button class="btn btn-nav" style="flex-direction: row; padding: 12px; width: 100%; border-radius: 12px;" onclick="openBankDetailsModal()">
          <span class="btn-icon">🔗</span> Manage Bank Details
        </button>
      </div>
    </div>

    <!-- Actions Panel -->
    <div class="transaction-buttons">
      <button class="btn btn-withdraw" onclick="openWithdrawModal()">
        <span class="btn-icon">💸</span> Withdraw
      </button>

      <button class="btn btn-deposit" onclick="openDepositModal()">
        <span class="btn-icon">📥</span> Deposit
      </button>

      <button class="btn btn-transfer" onclick="openTransferModal()">
        <span class="btn-icon">🔄</span> Transfer
      </button>

      <button class="btn btn-nav" onclick="goToPassbook()">
        <span class="btn-icon">📖</span> Passbook
      </button>

      <button class="btn btn-nav" onclick="openUpdateModal()">
        <span class="btn-icon">👤</span> Update Profile
      </button>
    </div>
  </div>
</div>

<!-- Withdraw Modal -->
<div id="withdrawModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">Withdraw Funds</div>
    <form id="withdrawForm">
      <div class="form-group">
        <label>Amount (₹)</label>
        <input type="number" id="withdrawAmount" placeholder="Enter amount to withdraw" step="0.01" min="0" required>
      </div>
      <div class="modal-buttons">
        <button type="button" class="btn-modal btn-cancel" onclick="closeWithdrawModal()">Cancel</button>
        <button type="submit" class="btn-modal btn-submit">Withdraw</button>
      </div>
    </form>
  </div>
</div>

<!-- Deposit Modal -->
<div id="depositModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">Deposit Funds</div>
    <form id="depositForm">
      <div class="form-group">
        <label>Amount (₹)</label>
        <input type="number" id="depositAmount" placeholder="Enter amount to deposit" step="0.01" min="0" required>
      </div>
      <div class="modal-buttons">
        <button type="button" class="btn-modal btn-cancel" onclick="closeDepositModal()">Cancel</button>
        <button type="submit" class="btn-modal btn-submit">Deposit</button>
      </div>
    </form>
  </div>
</div>

<!-- Update Profile Modal -->
<div id="updateModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">Update Profile</div>
    <form id="updateForm">
      <div class="form-group">
        <label>Field to Update</label>
        <select id="updateKey" required>
          <option value="name">Name</option>
          <option value="password">Password</option>
          <option value="email">Email</option>
        </select>
      </div>
      <div class="form-group">
        <label>New Value</label>
        <input type="text" id="updateValue" placeholder="Enter new value" required>
      </div>
      <div class="modal-buttons">
        <button type="button" class="btn-modal btn-cancel" onclick="closeUpdateModal()">Cancel</button>
        <button type="submit" class="btn-modal btn-submit">Update</button>
      </div>
    </form>
  </div>
</div>

<!-- Transfer Funds Modal -->
<div id="transferModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">Transfer Funds</div>
    <form id="transferForm">
      <div class="form-group">
        <label>Recipient Username</label>
        <input type="text" id="transferUsername" placeholder="Enter recipient username" required>
      </div>
      <div class="form-group">
        <label>Amount (₹)</label>
        <input type="number" id="transferAmount" placeholder="Enter transfer amount" step="0.01" min="0.5" required>
      </div>
      <div class="modal-buttons">
        <button type="button" class="btn-modal btn-cancel" onclick="closeTransferModal()">Cancel</button>
        <button type="submit" class="btn-modal btn-submit">Transfer</button>
      </div>
    </form>
  </div>
</div>

<!-- Bank Details Modal -->
<div id="bankDetailsModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">Manage Bank Details</div>
    <form id="bankDetailsForm">
      <div class="form-group">
        <label>Bank Name</label>
        <input type="text" id="bankNameInput" placeholder="e.g. State Bank of India" required>
      </div>
      <div class="form-group">
        <label>Account Number</label>
        <input type="text" id="accountNumberInput" placeholder="e.g. 1000293849182" required pattern="[0-9]{9,18}">
      </div>
      <div class="form-group">
        <label>IFSC Code</label>
        <input type="text" id="ifscCodeInput" placeholder="e.g. SBIN0001234" required pattern="^[A-Z]{4}0[A-Z0-9]{6}$">
      </div>
      <div class="form-group">
        <label>Branch</label>
        <input type="text" id="branchInput" placeholder="e.g. Mumbai Main Branch" required>
      </div>
      <div class="modal-buttons">
        <button type="button" class="btn-modal btn-cancel" onclick="closeBankDetailsModal()">Cancel</button>
        <button type="submit" class="btn-modal btn-submit">Save Details</button>
      </div>
    </form>
  </div>
</div>

<script>
  const API_URL = 'http://localhost:8081';
  let userId = null;
  let role = 'customer';

  function validateUserAccess() {
      const storedUserId = localStorage.getItem("userId");
      const storedRole = localStorage.getItem("role") || "customer";

      const params = new URLSearchParams(window.location.search);
      const urlUserId = params.get("id");

      if (!storedUserId) {
          window.location.href = "login.html";
          return;
      }

      if (urlUserId && urlUserId !== storedUserId) {
          alert("Unauthorized access detected!");
          window.location.href = "login.html";
          return;
      }

      userId = storedUserId;
      role = storedRole;
      window.history.replaceState({}, document.title, "dashboard.html");
  }

  async function loadDashboard() {
      document.getElementById('userId').textContent = userId;

      try {
          const res = await fetch(`${API_URL}/get-details/${userId}`);
          const data = await res.json();

          if (document.getElementById('welcomeText')) {
              document.getElementById('welcomeText').textContent = `Welcome, ${data.username}`;
          }

          if (document.getElementById('balance')) {
              document.getElementById('balance').textContent = data.balance.toLocaleString('en-IN', {
                  minimumFractionDigits: 2,
                  maximumFractionDigits: 2
              });
          }

          // Populate bank details
          const bName = data.bankName || '';
          const accNum = data.accountNumber || '';
          const ifsc = data.ifscCode || '';
          const brch = data.branch || '';

          const nameTextEl = document.getElementById('bankNameText');
          const accTextEl = document.getElementById('accountNumberText');
          const ifscTextEl = document.getElementById('ifscCodeText');
          const branchTextEl = document.getElementById('branchText');

          nameTextEl.textContent = bName || 'Not Linked';
          nameTextEl.className = bName ? 'value' : 'value empty';

          accTextEl.textContent = accNum ? '•••• •••• ' + accNum.slice(-4) : 'Not Linked';
          accTextEl.className = accNum ? 'value' : 'value empty';

          ifscTextEl.textContent = ifsc || 'Not Linked';
          ifscTextEl.className = ifsc ? 'value' : 'value empty';

          branchTextEl.textContent = brch || 'Not Linked';
          branchTextEl.className = brch ? 'value' : 'value empty';

          // Pre-fill inputs
          document.getElementById('bankNameInput').value = bName;
          document.getElementById('accountNumberInput').value = accNum;
          document.getElementById('ifscCodeInput').value = ifsc;
          document.getElementById('branchInput').value = brch;

      } catch (err) {
          console.error(err);
          showMessage('dashMessage', 'Failed to load dashboard data', 'error');
      }
  }

  function showMessage(elementId, message, type) {
      const messageEl = document.getElementById(elementId);
      messageEl.textContent = message;
      messageEl.className = `message ${type} show`;
      setTimeout(() => {
          messageEl.classList.remove('show');
      }, 4000);
  }

  /* Modals Open/Close functions */
  function openWithdrawModal() { document.getElementById('withdrawModal').classList.add('show'); }
  function closeWithdrawModal() {
      document.getElementById('withdrawModal').classList.remove('show');
      document.getElementById('withdrawForm').reset();
  }

  function openDepositModal() { document.getElementById('depositModal').classList.add('show'); }
  function closeDepositModal() {
      document.getElementById('depositModal').classList.remove('show');
      document.getElementById('depositForm').reset();
  }

  function openTransferModal() { document.getElementById('transferModal').classList.add('show'); }
  function closeTransferModal() {
      document.getElementById('transferModal').classList.remove('show');
      document.getElementById('transferForm').reset();
  }

  function openUpdateModal() { document.getElementById('updateModal').classList.add('show'); }
  function closeUpdateModal() {
      document.getElementById('updateModal').classList.remove('show');
      document.getElementById('updateForm').reset();
  }

  function openBankDetailsModal() { document.getElementById('bankDetailsModal').classList.add('show'); }
  function closeBankDetailsModal() { document.getElementById('bankDetailsModal').classList.remove('show'); }

  /* Submit Handlers */
  document.getElementById('withdrawForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const withdrawData = {
          id: parseInt(userId),
          amount: parseFloat(document.getElementById('withdrawAmount').value)
      };

      try {
          const response = await fetch(`${API_URL}/withdraw`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(withdrawData)
          });
          const result = await response.text();

          if (result && result.toLowerCase().includes('successfully')) {
              showMessage('dashMessage', 'Withdrawal successful!', 'success');
              closeWithdrawModal();
              loadDashboard();
          } else {
              showMessage('dashMessage', result || 'Withdrawal failed', 'error');
          }
      } catch (error) {
          showMessage('dashMessage', 'Error processing withdrawal', 'error');
          console.error(error);
      }
  });

  document.getElementById('depositForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const depositData = {
          id: parseInt(userId),
          amount: parseFloat(document.getElementById('depositAmount').value)
      };

      try {
          const response = await fetch(`${API_URL}/deposit`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(depositData)
          });
          const result = await response.text();

          if (result && result.toLowerCase().includes('successful')) {
              showMessage('dashMessage', 'Deposit successful!', 'success');
              closeDepositModal();
              loadDashboard();
          } else {
              showMessage('dashMessage', result || 'Deposit failed', 'error');
          }
      } catch (error) {
          showMessage('dashMessage', 'Error processing deposit', 'error');
          console.error(error);
      }
  });

  document.getElementById('transferForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const transferData = {
          id: parseInt(userId),
          amount: parseFloat(document.getElementById('transferAmount').value),
          username: document.getElementById('transferUsername').value.trim()
      };

      try {
          const response = await fetch(`${API_URL}/transfer`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(transferData)
          });
          const result = await response.text();

          if (response.ok && result && result.toLowerCase().includes('successfully')) {
              showMessage('dashMessage', 'Transfer successful!', 'success');
              closeTransferModal();
              loadDashboard();
          } else {
              showMessage('dashMessage', result || 'Transfer failed', 'error');
          }
      } catch (error) {
          showMessage('dashMessage', 'Error processing transfer', 'error');
          console.error(error);
      }
  });

  document.getElementById('updateForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const updateData = {
          id: parseInt(userId),
          key: document.getElementById('updateKey').value,
          value: document.getElementById('updateValue').value.trim()
      };

      try {
          const response = await fetch(`${API_URL}/update`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(updateData)
          });
          const result = await response.text();
          if (response.ok && result && result.toLowerCase().includes('successfully')) {
              showMessage('dashMessage', 'Profile updated successfully!', 'success');
              closeUpdateModal();
              loadDashboard();
          } else {
              showMessage('dashMessage', result || 'Update failed', 'error');
          }
      } catch (error) {
          showMessage('dashMessage', 'Error updating profile', 'error');
          console.error(error);
      }
  });

  document.getElementById('bankDetailsForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const bankData = {
          bankName: document.getElementById('bankNameInput').value.trim(),
          accountNumber: document.getElementById('accountNumberInput').value.trim(),
          ifscCode: document.getElementById('ifscCodeInput').value.trim().toUpperCase(),
          branch: document.getElementById('branchInput').value.trim()
      };

      try {
          const response = await fetch(`${API_URL}/update-bank-details/${userId}`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(bankData)
          });
          const result = await response.text();
          if (response.ok && result.toLowerCase().includes('successfully')) {
              showMessage('dashMessage', 'Bank details updated successfully!', 'success');
              closeBankDetailsModal();
              loadDashboard();
          } else {
              showMessage('dashMessage', result || 'Failed to update bank details', 'error');
          }
      } catch (error) {
          showMessage('dashMessage', 'Error updating bank details', 'error');
          console.error(error);
      }
  });

  function logout() {
      localStorage.clear();
      window.location.href = 'home.html';
  }

  function goToPassbook() {
      window.location.href = `passbook.html?id=${userId}&role=${encodeURIComponent(role)}`;
  }

  window.addEventListener('DOMContentLoaded', () => {
      validateUserAccess();
      loadDashboard();
  });

  window.addEventListener('click', (e) => {
      const modals = ['withdrawModal', 'depositModal', 'transferModal', 'updateModal', 'bankDetailsModal'];
      modals.forEach(mId => {
          const m = document.getElementById(mId);
          if (e.target === m) {
              m.classList.remove('show');
          }
      });
  });
</script>
</body>
