<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>History - Virtual Banking System</title>
  <!-- Import Modern Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
        --primary-gradient: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
        --dark-bg: #0f172a;
        --card-bg: rgba(30, 41, 59, 0.7);
        --text-main: #f8fafc;
        --text-muted: #94a3b8;
        --border-color: rgba(255, 255, 255, 0.1);
        --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        
        --success-color: #10b981;
        --danger-color: #f43f5e;
        --info-color: #0ea5e9;
    }

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: 'Outfit', sans-serif;
        background: radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.1) 0%, transparent 40%),
                    radial-gradient(circle at 90% 80%, rgba(124, 58, 237, 0.1) 0%, transparent 40%),
                    var(--dark-bg);
        min-height: 100vh;
        color: var(--text-main);
        padding: 30px 20px;
    }

    .container {
        width: 100%;
        max-width: 900px;
        margin: 0 auto;
        background: var(--card-bg);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid var(--border-color);
        border-radius: 24px;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        overflow: hidden;
    }

    .header {
        background: rgba(15, 23, 42, 0.4);
        padding: 25px 40px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid var(--border-color);
    }

    .header-left h1 {
        font-size: 26px;
        font-weight: 800;
        letter-spacing: -1px;
    }

    .btn-header {
        padding: 10px 20px;
        background: rgba(255, 255, 255, 0.05);
        color: white;
        border: 1px solid var(--border-color);
        border-radius: 12px;
        cursor: pointer;
        font-weight: 600;
        transition: var(--transition);
        text-decoration: none;
        font-size: 14px;
        display: flex;
        align-items: center;
        gap: 6px;
    }

    .btn-header:hover {
        background: rgba(255, 255, 255, 0.15);
        border-color: white;
    }

    .content {
        padding: 40px;
    }

    .table-wrapper {
        background: rgba(15, 23, 42, 0.2);
        border: 1px solid var(--border-color);
        padding: 25px;
        border-radius: 20px;
        overflow-x: auto;
    }

    .history-table {
        width: 100%;
        border-collapse: collapse;
        text-align: left;
    }

    .history-table th {
        padding: 16px;
        color: var(--text-muted);
        font-weight: 600;
        font-size: 13px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        border-bottom: 1px solid var(--border-color);
    }

    .history-table tbody tr {
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        transition: var(--transition);
    }

    .history-table tbody tr:hover {
        background: rgba(255, 255, 255, 0.02);
    }

    .history-table td {
        padding: 16px;
        font-size: 14px;
        color: white;
    }

    .history-table td:first-child {
        font-weight: 600;
        color: #818cf8;
        width: 80px;
    }

    .history-table td:nth-child(2) {
        color: #e2e8f0;
        word-break: break-word;
    }

    .date {
        color: var(--text-muted);
        font-size: 12px;
        white-space: nowrap;
    }

    .history-empty {
        text-align: center;
        padding: 60px 20px;
        color: var(--text-muted);
        font-size: 16px;
    }

    .history-empty::before {
        content: '📋';
        display: block;
        font-size: 48px;
        margin-bottom: 15px;
    }

    @media (max-width: 768px) {
        .header {
            flex-direction: column;
            gap: 15px;
            text-align: center;
        }

        .history-table th,
        .history-table td {
            padding: 12px 10px;
            font-size: 13px;
        }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="header-left">
      <h1>Audit Log</h1>
    </div>
    <div>
      <button class="btn-header" onclick="goBackToAdmin()">← Back</button>
    </div>
  </div>
  <div class="content">
    <div id="historyMessage" class="history-empty" style="display:none"></div>
    <div class="table-wrapper">
      <table class="history-table" id="historyTable">
        <thead>
        <tr>
          <th>ID</th>
          <th>Description</th>
          <th>Timestamp</th>
        </tr>
        </thead>
        <tbody id="historyBody">
        <tr>
          <td colspan="3" class="history-empty" style="border:none">Loading histories...</td>
        </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script>
  const API_URL = 'http://localhost:8081';
  let userId = null;

  function getUserIdFromURL() {
      const params = new URLSearchParams(window.location.search);
      const urlUserId = params.get('id');
      const storedUserId = localStorage.getItem('userId');
      userId = storedUserId || urlUserId;
  }

  function goBackToAdmin() {
      const params = new URLSearchParams();
      if (userId) params.set('id', userId);
      params.set('role', 'admin');
      window.location.href = `admin.html?${params.toString()}`;
  }

  async function loadHistories() {
      try {
          const res = await fetch(`${API_URL}/histories`);
          if (!res.ok) throw new Error('Failed to load histories');
          const histories = await res.json();
          renderHistories(histories);
      } catch (err) {
          console.error(err);
          const body = document.getElementById('historyBody');
          body.innerHTML = `<tr><td colspan="3" class="history-empty">Unable to load audit log. Ensure backend is running.</td></tr>`;
      }
  }

  function renderHistories(list) {
      const body = document.getElementById('historyBody');
      if (!list || list.length === 0) {
          body.innerHTML = `<tr><td colspan="3" class="history-empty">No history records found.</td></tr>`;
          return;
      }

      // Sort by newest first
      const sorted = [...list].sort((a, b) => b.id - a.id);

      body.innerHTML = sorted.map(h => `
          <tr>
              <td>#${h.id}</td>
              <td>${escapeHtml(h.description)}</td>
              <td class="date">${formatDate(h.data)}</td>
          </tr>
      `).join('');
  }

  function formatDate(d) {
      if (!d) return '';
      const dt = new Date(d);
      if (isNaN(dt)) return d;
      return dt.toLocaleString('en-IN');
  }

  function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/[&<>"']/g, function(c) {
          return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":"&#39;"}[c];
      });
  }

  window.addEventListener('DOMContentLoaded', () => {
      getUserIdFromURL();
      loadHistories();
  });
</script>
</body>
</html>
