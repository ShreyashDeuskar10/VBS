<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Virtual Banking System - Login</title>
  <!-- Import Modern Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
        --primary-gradient: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
        --dark-bg: #0f172a;
        --card-bg: rgba(30, 41, 59, 0.7);
        --text-main: #f8fafc;
        --text-muted: #94a3b8;
        --border-color: rgba(255, 255, 255, 0.1);
        --input-bg: rgba(15, 23, 42, 0.6);
        --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: 'Outfit', sans-serif;
        background: radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.15) 0%, transparent 40%),
                    radial-gradient(circle at 90% 80%, rgba(124, 58, 237, 0.15) 0%, transparent 40%),
                    var(--dark-bg);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        color: var(--text-main);
        padding: 20px;
    }

    .container {
        width: 90%;
        max-width: 450px;
        background: var(--card-bg);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid var(--border-color);
        border-radius: 24px;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        overflow: hidden;
        transition: var(--transition);
    }

    .container:hover {
        border-color: rgba(255, 255, 255, 0.15);
    }

    .header {
        background: var(--primary-gradient);
        padding: 30px;
        text-align: center;
        color: white;
    }

    .header h1 {
        font-size: 30px;
        font-weight: 800;
        letter-spacing: -1px;
    }

    .header p {
        font-size: 13px;
        opacity: 0.85;
        letter-spacing: 1px;
        text-transform: uppercase;
        margin-top: 4px;
    }

    .content {
        padding: 40px 30px;
    }

    h2 {
        color: white;
        margin-bottom: 25px;
        text-align: center;
        font-size: 24px;
        font-weight: 700;
    }

    .form-group {
        margin-bottom: 20px;
    }

    .form-group label {
        display: block;
        margin-bottom: 8px;
        color: var(--text-muted);
        font-weight: 500;
        font-size: 14px;
    }

    .form-group input,
    .form-group select {
        width: 100%;
        padding: 12px 15px;
        border: 1px solid var(--border-color);
        background: var(--input-bg);
        border-radius: 12px;
        font-size: 14px;
        color: white;
        transition: var(--transition);
        font-family: inherit;
    }

    .form-group select option {
        background: var(--dark-bg);
        color: white;
    }

    .form-group input:focus,
    .form-group select:focus {
        outline: none;
        border-color: #6366f1;
        box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        background: rgba(15, 23, 42, 0.8);
    }

    .btn {
        width: 100%;
        padding: 14px;
        border: none;
        border-radius: 12px;
        font-size: 16px;
        cursor: pointer;
        transition: var(--transition);
        font-weight: 600;
        background: var(--primary-gradient);
        color: white;
        box-shadow: 0 4px 15px rgba(99, 102, 241, 0.35);
        margin-top: 10px;
    }

    .btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 25px rgba(99, 102, 241, 0.5);
    }

    .link {
        text-align: center;
        margin-top: 20px;
        color: var(--text-muted);
        font-size: 14px;
    }

    .link a {
        color: #818cf8;
        text-decoration: none;
        font-weight: 600;
        cursor: pointer;
        transition: var(--transition);
    }

    .link a:hover {
        color: #a5b4fc;
        text-decoration: underline;
    }

    .message {
        padding: 12px;
        border-radius: 12px;
        margin-bottom: 20px;
        font-size: 14px;
        display: none;
    }

    .message.success {
        background: rgba(16, 185, 129, 0.15);
        color: #34d399;
        border: 1px solid rgba(16, 185, 129, 0.25);
    }

    .message.error {
        background: rgba(239, 68, 68, 0.15);
        color: #f87171;
        border: 1px solid rgba(239, 68, 68, 0.25);
    }

    .message.show {
        display: block;
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>VBS</h1>
    <p>Virtual Banking System</p>
  </div>

  <div class="content">
    <h2>Secure Login</h2>

    <div id="loginMessage" class="message"></div>

    <form id="loginForm">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="loginUsername" required placeholder="Enter your username">
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" id="loginPassword" required placeholder="Enter your password">
      </div>

      <div class="form-group">
        <label>Role</label>
        <select id="loginRole" required>
          <option value="">Select Role</option>
          <option value="customer">Customer</option>
          <option value="admin">Admin</option>
        </select>
      </div>

      <button type="submit" class="btn">Login</button>
    </form>

    <div class="link">
      Don't have an account? <a onclick="window.location.href='signup.html'">Sign Up</a>
    </div>
    <div class="link" style="margin-top: 10px;">
      <a onclick="window.location.href='home.html'">← Back to Home</a>
    </div>
  </div>
</div>

<script>
  const API_URL = 'http://localhost:8081';

  function showMessage(elementId, message, type) {
      const messageEl = document.getElementById(elementId);
      messageEl.textContent = message;
      messageEl.className = `message ${type} show`;
  }

  document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const loginData = {
          username: document.getElementById('loginUsername').value,
          password: document.getElementById('loginPassword').value,
          role: document.getElementById('loginRole').value
      };

      try {
          const response = await fetch(`${API_URL}/login`, {
              method: 'POST',
              headers: {
                  'Content-Type': 'application/json',
              },
              body: JSON.stringify(loginData)
          });

          const result = (await response.text()).trim();

          if (/^\d+$/.test(result)) {
              showMessage('loginMessage', 'Login successful! Redirecting...', 'success');

              localStorage.clear();
              localStorage.setItem("userId", result);

              const role = loginData.role.trim().toLowerCase();
              localStorage.setItem("role", role);

              setTimeout(() => {
                  if (role === "admin") {
                      window.location.href = `admin.html?id=${result}`;
                  } else {
                      window.location.href = `dashboard.html?id=${result}`;
                  }
              }, 800);

          } else {
              showMessage('loginMessage', result, 'error');
          }
      } catch (error) {
          showMessage('loginMessage', 'Error connecting to server. Please try again.', 'error');
          console.error('Login error:', error);
      }
  });
</script>

</body>
</html>
